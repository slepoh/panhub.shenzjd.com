name: Build and push Docker image

on:
  push:
    branches: [main, dev]
    paths:
      [
        "Dockerfile",
        ".github/workflows/docker-image.yml",
        "**/*.ts",
        "**/*.vue",
        "package.json",
        "pnpm-lock.yaml",
      ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Read version and prepare tags
        id: tags
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> $GITHUB_OUTPUT
          REPO="${{ github.event.repository.name }}"
          {
            echo "ghcr.io/${{ github.repository }}:$VER"
            echo "ghcr.io/${{ github.repository }}:latest"
            echo "${{ steps.meta.outputs.tags }}"
            if [ -n "$DOCKERHUB_USERNAME" ]; then
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:$VER"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:latest"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:${{ github.ref_name }}"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:sha-${{ github.sha }}"
            fi
          } | grep -v '^$' > tags.txt
          echo "list<<EOF" >> $GITHUB_OUTPUT
          cat tags.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha

      - name: Read version and prepare tags
        id: tags
        run: |
          VER=$(node -p "require('./package.json').version")
          REPO="${{ github.event.repository.name }}"
          {
            echo "ghcr.io/${{ github.repository }}:$VER"
            echo "ghcr.io/${{ github.repository }}:latest"
            echo "${{ steps.meta.outputs.tags }}"
            if [ -n "$DOCKERHUB_USERNAME" ]; then
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:$VER"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:latest"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:${{ github.ref_name }}"
              echo "docker.io/$DOCKERHUB_USERNAME/$REPO:sha-${{ github.sha }}"
            fi
          } | grep -v '^$' > tags.txt
          echo "list<<EOF" >> $GITHUB_OUTPUT
          cat tags.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          TAGS=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && TAGS="$TAGS -t $tag"
          done < tags.txt
          docker buildx imagetools create \
            $TAGS \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/${{ github.repository }}:latest
